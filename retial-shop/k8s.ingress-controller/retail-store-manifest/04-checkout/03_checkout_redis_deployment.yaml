apiVersion: apps/v1
kind: Deployment 
metadata:
  name: checkout-redis
  labels:
    app.kubernetes.io/name: checkout-redis
    app.kubernetes.io/instance: checkout
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com

spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout-redis
      app.kubernetes.io/instance: checkout
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout-redis
        app.kubernetes.io/instance: checkout
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      containers:
        - name: redis
          image: "redis:6.0-alpine"
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP