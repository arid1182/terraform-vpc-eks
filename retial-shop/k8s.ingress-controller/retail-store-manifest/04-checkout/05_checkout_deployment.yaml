apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  labels:
    app.kubernetes.io/name: checkout
    app.kubernetes.io/instance: checkout
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: checkout
      app.kubernetes.io/instance: checkout
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: checkout
        app.kubernetes.io/instance: checkout
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
      annotations:
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
        prometheus.io/scrape: "true"
        
    spec:
      serviceAccountName: checkout-sa
      securityContext:
        fsGroup: 1000
      containers:
        - name: checkout
          image: "public.ecr.aws/aws-containers/retail-store-sample-checkout:1.2.4"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: checkout-cm
          securityContext:
            capabilities:
              drop:
              - ALL
            runAsUser: 1000
            runAsNonRootUser: true
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          resources:
            limits:
              memory: 256Mi
            requests:
              memory: 256Mi
              cpu: 128m
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp 
      volumes: 
        - name: tmp-volume
          emptyDir: {}

