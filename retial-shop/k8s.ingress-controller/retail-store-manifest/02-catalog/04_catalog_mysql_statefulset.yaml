apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: catalog-mysql
  labels:
    app.kubernetes.io/name: catalog-mysql
    app.kubernetes.io/instance: catalog-mysql
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com
spec:
  replicas: 1
  serviceName: catalog-mysql-sa
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-mysql
      app.kubernetes.io/instance: catalog-mysql
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-mysql
        app.kubernetes.io/instance: catalog-mysql
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      containers:
        - name: mysql
          image: "public.ecr.aws/docker/library/mysql:8.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: my-secret-pw
            - name: MYSQL_DATABASE
              value: catalog
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: catalog-db
                  key: RETAIL_CATALOG_PERSISTENCE_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: catalog-db
                  key: RETAIL_CATALOG_PERSISTENCE_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
      volumes:
      - name: data
        emptyDir: {}
