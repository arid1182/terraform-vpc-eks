apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-rabbitmq
  labels:
    app.kubernetes.io/name: orders-rabbitmq
    app.kubernetes.io/instance: orders
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com

spec:
  replicas: 1
  serviceName: orders-rabbitmq-svc
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-rabbitmq
      app.kubernetes.io/instance: orders
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-rabbitmq
        app.kubernetes.io/instance: orders
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      containers:
        - name: postgress
          image: "public.ecr.aws/docker/library/postgres:16.1"
          imagePullPolicy: IfNotPresent
          ports: 
            - name: amqp
              containerPort: 5672
              protocol: TCP
            - name: http 
              containerPort: 15672
              protocol: TCP
          volumeMount:
            - name: data
              mountPath: "/var/lib/rabbitmq/mnesia"
      volumes:
        - name: data
          emptyDir: {}
            
