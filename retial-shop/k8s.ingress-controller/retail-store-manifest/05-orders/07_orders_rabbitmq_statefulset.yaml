# Source: retail-store-sample-orders-chart/templates/rabbitmq-statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-rabbitmq
  labels:
    app.kubernetes.io/name: orders-rabbitmq
    app.kubernetes.io/instance: orders-rabbitmq
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com
spec:
  replicas: 1
  serviceName: orders-rabbitmq
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-rabbitmq
      app.kubernetes.io/instance: orders-rabbitmq
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-rabbitmq
        app.kubernetes.io/instance: orders-rabbitmq
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      containers:
        - name: rabbitmq
          image: "public.ecr.aws/docker/library/rabbitmq:3-management"
          imagePullPolicy: IfNotPresent
          ports:
          - name: amqp
            containerPort: 5672
            protocol: TCP
          - name: http
            containerPort: 15672
            protocol: TCP
          volumeMounts:
          - name: data
            mountPath: "/var/lib/rabbitmq/mnesia"
      volumes:
      - name: data
        emptyDir: {}