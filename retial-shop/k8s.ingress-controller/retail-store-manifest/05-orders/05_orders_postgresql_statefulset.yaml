apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orders-postgresql
  labels:
    app.kubernetes.io/name: orders-postgresql
    app.kubernetes.io/instance: orders
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com

spec:
  replicas: 1
  serviceName: orders-postgresql-svc
  selector:
    matchLabels:
      app.kubernetes.io/name: orders-postgresql
      app.kubernetes.io/instance: orders
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orders-postgresql
        app.kubernetes.io/instance: orders
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      containers:
        - name: postgress
          image: "public.ecr.aws/docker/library/postgres:16.1"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: orders
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  key: RETAIL_ORDERS_PERSISTENCE_USERNAME
                  name: orders-db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: RETAIL_ORDERS_PERSISTENCE_PASSWORD
                  name: orders-db
            - name: PGDATA
              value: /data/pgdata
          ports: 
            - name: postgresql
              protocol: TCP
              containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
