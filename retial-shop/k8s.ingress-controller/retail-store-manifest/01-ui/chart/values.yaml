# ── Global Labels ─────────────────────────────────────────────────────────────
global:
  instance: ui
  component: app
  owner: capclouds.com

# ── Service Account ───────────────────────────────────────────────────────────
serviceAccount:
  name: ui-sa
  # Uncomment and set for IRSA on EKS
  # annotations:
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ui-irsa-role

# ── ConfigMap ─────────────────────────────────────────────────────────────────
configMap:
  name: ui-configmap
  data:
    RETAIL_UI_ENDPOINTS_CATALOG: http://catalog
    RETAIL_UI_ENDPOINTS_CARTS: http://carts
    RETAIL_UI_ENDPOINTS_CHECKOUT: http://checkout
    RETAIL_UI_ENDPOINTS_ORDERS: http://orders

# ── Service ───────────────────────────────────────────────────────────────────
service:
  name: ui-np
  type: NodePort
  port: 80
  targetPort: http
  protocol: TCP

# ── Deployment ────────────────────────────────────────────────────────────────
deployment:
  name: ui-app
  replicaCount: 1

  strategy:
    type: RollingUpdate
    maxUnavailable: 1

  image:
    repository: public.ecr.aws/aws-containers/retail-store-sample-ui
    tag: "1.2.4"
    pullPolicy: IfNotPresent

  # Prometheus scraping annotations
  prometheus:
    scrape: "true"
    path: /actuator/prometheus
    port: "8080"

  container:
    name: ui
    port:
      name: http
      containerPort: 8080
      protocol: TCP

  # Environment variables (downward API — do not change these)
  env:
    javaOpts: "-XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/urandom"

  # Readiness probe
  readinessProbe:
    path: /actuator/health/readiness
    port: 8080
    initialDelaySeconds: 10

  # Resources
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 128m
      memory: 512Mi

  # Security context — pod level
  podSecurityContext:
    fsGroup: 1000

  # Security context — container level
  securityContext:
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    capabilities:
      add:
        - NET_BIND_SERVICE
      drop:
        - ALL

  # Tmp volume for Java writes
  tmpVolume:
    mountPath: /tmp
    name: tmp-volume

# ── Ingress (AWS ALB) ─────────────────────────────────────────────────────────
ingress:
  enabled: true                                   # set false to disable ingress
  name: retail-store-http-instance-mode
  component: ingress

  className: alb

  # ── ALB Annotations ─────────────────────────────
  alb:
    loadBalancerName: retail-store-http-instance-mode
    scheme: internet-facing                        # internet-facing | internal
    targetType: instance                           # instance | ip

    healthCheck:
      protocol: HTTP
      port: traffic-port
      path: /actuator/health/readiness
      intervalSeconds: "15"
      timeoutSeconds: "5"
      successCodes: "200"
      healthyThresholdCount: "2"
      unhealthyThresholdCount: "2"

    # Add any extra ALB annotations here
    extraAnnotations: {}
    # extraAnnotations:
    #   alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT:certificate/xxx
    #   alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    #   alb.ingress.kubernetes.io/ssl-redirect: '443'

  # ── Default Backend ──────────────────────────────
  defaultBackend:
    serviceName: ui-np
    servicePort: 80

  # ── Optional path-based routing rules ───────────
  # Leave empty to use defaultBackend only
  rules: []
  # rules:
  #   - host: retail.capclouds.com
  #     paths:
  #       - path: /
  #         pathType: Prefix
  #         serviceName: ui-np
  #         servicePort: 80
