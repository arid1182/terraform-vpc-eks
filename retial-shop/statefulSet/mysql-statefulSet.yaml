apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysq-statefulset
  labels:
    app.kubernetes.io/name: catalog-mysql
    app.kubernetes.io/instance: catalog
    app.kubernetes.io/component: statefulset
    app.kubernetes.io/owner: capclouds.com
spec:
  serviceName: catalog-svc
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-mysql
      app.kubernetes.io/instance: catalog
      app.kubernetes.io/component: statefulset
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-mysql
        app.kubernetes.io/instance: catalog
        app.kubernetes.io/component: statefulset
        app.kubernetes.io/owner: capclouds.com
    spec:
      serviceAccount: catalog-mysql-sa
      securityContext:
        fsGroup: 999
      containers:
        - name: catalog-mysql
          image: "public.ecr.aws/docker/library/mysql:8.0"
          imagePullPolicy: IfNotPresent
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: mySecretPasswd
            - name: MYSQL_DATABASE
              value: catalogdb
          command: ["/bin/bash", "-c"]
          args:
            - |
              export MYSQL_USER=$(cat /mnt/secrets-store/MYSQL-USER);
              export MYSQL_PASSWORD=$(cat /mnt/secrets-store/MYSQL-PASSWORD);
              echo "Loaded secrets from AWS Secrets Manager. Starting MySQL with user=$MYSQL_USER";
              exec docker-entrypoint.sh mysqld
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: aws-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
          securityContext:
            runAsUser: 999
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          startupProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            failureThreshold: 30    # 30 * 10s = 300s total startup
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mysqladmin ping -h 127.0.0.1 -uroot -p"${MYSQL_ROOT_PASSWORD}"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
      volumes: 
        - name: data
          emptyDir: {}
        - name: aws-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "catalog-db-secrets"
