apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-app
  labels:
    app.kubernetes.io/name: catalog-app
    app.kubernetes.io/instance: catalog
    app.kubernetes.io/component: app
    app.kubernetes.io/owner: capclouds.com

spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-app
      app.kubernetes.io/instance: catalog
      app.kubernetes.io/component: app
      app.kubernetes.io/owner: capclouds.com
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-app
        app.kubernetes.io/instance: catalog
        app.kubernetes.io/component: app
        app.kubernetes.io/owner: capclouds.com
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: catalog-app
          envFrom:
            - configMapRef:
                name: catalog-configmap
          image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0"
          imagePullPolicy: IfNotPresent
          ports: 
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
          livenessProbe:
            httpGet: 
              path: /health
              port: 8080
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 256Mi
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault



